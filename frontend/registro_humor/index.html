<!doctype html>
<html lang="en">
  <head>

          </div>
        </div>
      </div>
      <div id="footer">
        <div class="Logo">
          <img src="../img/logo.jpg" class="imgLogo" alt="Logo do Site" />
          <p class="paragLogo">MOODLY</p>
        </div>
        <div id="contatos">
            <p>Fale com a gente!</p>
            <p>moodly@gmail.com</p>
